name: Automated build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    type: [ released ]

  workflow_dispatch:

jobs:
  build:
    runs-on: [windows-latest]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore ChummerGenSR4.sln

      - name: Get short commit SHA
        id: short-sha
        shell: pwsh
        run: |
          $sha = git rev-parse --short=6 HEAD
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Calculate version
        id: version
        shell: pwsh
        run: |
          # Keep the version used by the former action so version strings remain unchanged.
          dotnet tool install --global minver-cli --version 4.2.0
          $version = minver `
            --auto-increment patch `
            --build-metadata "${{ steps.short-sha.outputs.sha }}" `
            --default-pre-release-phase beta `
            --minimum-major-minor 0.1 `
            --tag-prefix v
          $semanticVersion = $version.Trim()
          $versionParts = $semanticVersion.Split('+')[0].Split('-', 2)
          $coreParts = $versionParts[0].Split('.')
          $revision = 0
          if ($versionParts.Count -gt 1) {
            $candidateRevision = $versionParts[1].Split('.')[-1]
            [void] [int]::TryParse($candidateRevision, [ref] $revision)
          }
          $assemblyVersion = "$($coreParts[0]).$($coreParts[1]).$($coreParts[2]).$revision"
          # '+' is semver's build-metadata separator, but GitHub rejects it in release asset
          # filenames (upload-to-release fails with HTTP 422). Use a dot there instead, matching
          # the naming convention of previous releases (e.g. ChummerGenSR4-0.1.500.6b1453.zip).
          $fileSafeVersion = $semanticVersion -replace '\+', '.'
          "version=$fileSafeVersion" >> $env:GITHUB_OUTPUT
          "assembly-version=$assemblyVersion" >> $env:GITHUB_OUTPUT

      - name: Set project versions
        id: update
        uses: vers-one/dotnet-project-version-updater@v1.8
        with:
          file: |
            "**/AssemblyInfo.cs"
          version: ${{ steps.version.outputs.assembly-version }}

      - name: Update XML data versions for release artifacts
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $baseRef = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $baseRef) {
            $baseRef = git rev-list --max-parents=0 HEAD
          }
          .github/scripts/Update-LanguageVersions.ps1 -BaseRef $baseRef -Mode Update
          .github/scripts/Update-DataVersions.ps1 -BaseRef $baseRef -Mode Update

      - name: Build the solution
        run: msbuild ChummerGenSR4.sln /p:Configuration=Release
        
      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.5
        with:
          type: 'zip'
          filename: "ChummerGenSR4-${{ steps.version.outputs.version }}.zip"
          path: "bin/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: "ChummerGenSR4-${{ steps.version.outputs.version }}"
          path: "ChummerGenSR4-${{ steps.version.outputs.version }}.zip"

  build-mono:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Install Mono
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete libgdiplus xvfb

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore NuGet packages
        run: nuget restore ChummerGenSR4.sln

      - name: Build the solution under Mono
        run: |
          if command -v msbuild >/dev/null 2>&1; then
            msbuild ChummerGenSR4.sln /p:Configuration=Release
          else
            echo "msbuild not found on PATH, falling back to xbuild"
            xbuild ChummerGenSR4.sln /p:Configuration=Release
          fi

      - name: Headless startup smoke test
        # Catches crash-on-startup regressions under Mono. Not a substitute for real UI testing,
        # but it's the cheapest automated check we have without a full UI test framework.
        run: |
          export LANG=en_US.UTF-8
          xvfb-run --auto-servernum mono bin/ChummerGenSR4.exe &
          APP_PID=$!
          sleep 10
          if ! kill -0 $APP_PID 2>/dev/null; then
            echo "ChummerGenSR4 exited within 10s of startup under Mono - treating as a crash."
            exit 1
          fi
          kill $APP_PID

  validate-xml:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Install libxml2 tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate all data/lang XML files are well-formed
        # Mandatory: catches broken tags, encoding issues, and other malformed-XML mistakes.
        shell: bash
        run: |
          status=0
          for xml in Chummer/data/data/*.xml Chummer/data/lang/*.xml; do
            xmllint --noout "$xml" || status=1
          done
          exit $status

      - name: Validate data XML files against their XSD schemas (informational)
        # Not mandatory: several data files predate strict schema conformance and don't fully
        # validate yet (tracked separately). This step surfaces schema drift in the log without
        # blocking builds/PRs until that pre-existing drift is cleaned up.
        continue-on-error: true
        shell: bash
        run: |
          status=0
          cd Chummer/data/data
          for xml in *.xml; do
            base="${xml%.xml}"
            xsd="$base.xsd"
            if [ -f "$xsd" ]; then
              echo "Validating $xml against $xsd"
              xmllint --noout --schema "$xsd" "$xml" || status=1
            fi
          done
          exit $status

  release:
    needs: [build, build-mono, validate-xml]
    runs-on: ubuntu-latest

    steps:
      - name: Download release version
        uses: actions/download-artifact@v7
        with:
          name: "ChummerGenSR4-${{ needs.build.outputs.version }}"

      - name: Upload to release
        uses: JasonEtco/upload-to-release@master
        if: github.event_name == 'release'
        with:
          args: ./ChummerGenSR4-${{ needs.build.outputs.version }}.zip application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
